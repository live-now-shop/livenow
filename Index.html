<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Now</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      position: relative;
      z-index: 2;
    }

    .logo {
      font-size: 64px;
      letter-spacing: 8px;
      font-weight: bold;
    }

    .subtitle {
      margin-top: 15px;
      font-size: 18px;
      opacity: 0.7;
    }

    .clock {
      margin-top: 40px;
      font-size: 42px;
      letter-spacing: 3px;
    }

    .tag {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.5;
    }

    /* animirane linije (vrijeme “nestaje”) */
    .line {
      position: absolute;
      width: 2px;
      height: 100%;
      background: rgba(255,255,255,0.05);
      animation: move 6s linear infinite;
    }

    .line:nth-child(1) { left: 20%; }
    .line:nth-child(2) { left: 40%; animation-delay: 2s; }
    .line:nth-child(3) { left: 60%; animation-delay: 4s; }
    .line:nth-child(4) { left: 80%; animation-delay: 1s; }

    @keyframes move {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
  </style>
</head>

<body>

  <div class="line"></div>
  <div class="line"></div>
  <div class="line"></div>
  <div class="line"></div>

  <div class="container">
    <div class="logo">LIVE NOW</div>
    <div class="subtitle">Time doesn’t come back.</div>

    <div class="clock" id="clock">--:--:--</div>

    <div class="tag">Minimal time-based concept brand</div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById("clock").textContent = `${h}:${m}:${s}`;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
